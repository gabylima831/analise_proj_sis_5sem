<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Minhas Tarefas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2ff;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #3730a3;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #3b82f6; /* 👈 MUDE A COR AQUI */
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.8;
    }

  </style>
</head>

<body>

  <h1>Minha Lista de Tarefas</h1>

  <div class="card">
    <p>✔️ Estudar programação</p>
    <p>✔️ Fazer atividade</p>
    <p>✔️ Subir projeto no GitHub</p>

    <button>Concluir Tudo</button>
  </div>

</body>
</html>
