<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas Tarefas</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #eef2ff, #dbeafe);
        text-align: center;
        padding: 40px;
        margin: 0;
      }

      h1 {
        color: #3730a3;
        margin-bottom: 30px;
      }

      .card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 320px;
        margin: auto;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .tarefas {
        text-align: left;
        margin-bottom: 20px;
      }

      label {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        font-size: 16px;
        padding: 10px;
        border-radius: 8px;
        transition: 0.2s;
      }

      label:hover {
        background: #f1f5f9;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      span {
        flex: 1;
      }

      input:checked + span {
        text-decoration: line-through;
        color: gray;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #2cc01c;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        opacity: 0.9;
        transform: scale(1.03);
      }

      button:active {
        transform: scale(0.98);
      }

      /* Responsivo (celular) */
      @media (max-width: 400px) {
        .card {
          width: 90%;
        }
      }
    </style>
  </head>

  <body>
    <h1>Lista de Tarefas</h1>

    <div class="card">
      <div class="tarefas">
        <label>
          <input type="checkbox" />
          <span>Estudar programação</span>
        </label><br />

        <label>
          <input type="checkbox" />
          <span>Fazer atividade</span>
        </label><br />

        <label>
          <input type="checkbox" />
          <span>Subir projeto no GitHub</span>
        </label>
      </div>

      <button onclick="marcarTudo()">Concluir Tudo</button>
    </div>

    <script>
      function marcarTudo() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = true);
      }
    </script>
  </body>
</html>
